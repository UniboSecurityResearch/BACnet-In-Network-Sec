#### Kathara BACnet/SC CSV Benchmark Client ####

x-sc-host = 200.1.1.9

#### Common Properties ####
common.mainClass = BACnetSCBenchmarkClient
common.mainScript = scripts/BACnetSCBenchmarkClient.py
common.shell = console
common.title = BACnetSC-CSV-Client

#### Device Object Properties ####
device.instance             = 555003
device.description          = Kathara BACnet/SC CSV Benchmark Client
device.modelName            = BACnetSC CSV Client
device.namePrefix           = KTNode
device.uuid                 = c673e790-c80d-49c7-88c0-333333333333

#### SC Properties ####
sc.primaryHubURI            = wss://${x-sc-host}:4443
sc.failoverHubURI           =
sc.hubFunctionEnable        = false
sc.hubFunctionBindURI       =
sc.directConnectEnable      = false
sc.directConnectBindURI     =
sc.directConnectAcceptURIs  =
sc.vmac                     = 333333333333
sc.nodeEnable               = true
sc.tlsVersion               = TLSv1.3
sc.noValidation             = false
sc.allowPlain               = false
sc.privateKey               = config/TestNode.key
sc.operationalCertificate   = config/TestNode.pem
sc.caCertificates           = config/TestSigningCertificate.pem

#### Benchmark Parameters ####
app.csvPath = /shared/HVAC-minute.csv
app.rawOutputPath = /shared/results_rtt_bacnet-sc-tls.txt
app.maxRows = 0
app.serverDeviceInstance = 555001
app.targetPropertyId = 77
app.bindRetryMs = 1000

# Periodic BACnet/SC reconnect simulation (0 = disabled).
# Example: app.reconnectEveryRows = 5000
app.reconnectEveryRows = 0

# Adds random jitter around reconnectEveryRows.
# Effective interval is sampled in [every-jitter, every+jitter], clamped to >= 1.
app.reconnectJitterRows = 0

# Delay between closing and reopening SC datalink for each forced reconnect.
app.reconnectPauseMs = 1500

# Random seed for deterministic reconnect intervals (-1 = non-deterministic).
app.reconnectSeed = -1
